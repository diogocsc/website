<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
  <script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>
<body class="admin-body">
  <div class="admin-login">
    <div class="admin-login__logo">◎</div>
    <h1 class="admin-login__title">Admin</h1>
    <p class="admin-login__sub">CV Portfolio Manager</p>
    {% if error %}
    <div class="admin-alert admin-alert--error">{{ error }}</div>
    {% endif %}
    <form method="POST" class="admin-login__form">
      <div class="form__field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter admin password" autofocus required />
      </div>
      <div class="form__field" style="margin-top: 1rem;">
        <div class="g-recaptcha" data-sitekey="{{ recaptcha_site_key }}"></div>
      </div>
      <button type="submit" class="form__submit" style="width:100%;justify-content:center;margin-top:1.25rem;">
        Sign in <span class="btn-arrow">→</span>
      </button>
    </form>
  </div>
</body>
</html>
